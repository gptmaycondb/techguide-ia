name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI globally first
        run: sudo npm install -g eas-cli

      - name: Install project dependencies
        run: npm install --ignore-scripts

      - name: Remove local eas-cli if exists
        run: rm -rf node_modules/.bin/eas node_modules/eas-cli || true

      - name: Verify EAS
        run: eas --version

      - name: Build APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive --no-wait

      - name: Done
        run: echo "Acompanhe em https://expo.dev/accounts/maycondb/projects/techguide-ia/builds"
