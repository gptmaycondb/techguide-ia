name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: sudo npm install -g eas-cli --force

      - name: Check EAS version
        run: which eas && eas --version

      - name: Build APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          export PATH=$(npm bin -g):$PATH
          eas build --platform android --profile preview --non-interactive --no-wait

      - name: Done
        run: echo "Acompanhe em https://expo.dev/accounts/maycondb/projects/techguide-ia/builds"
